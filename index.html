<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Health Advisor</title>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f14;
      --surface:  #131920;
      --border:   #1e2d3d;
      --accent:   #00e5a0;
      --accent2:  #00b4d8;
      --warn:     #ff6b6b;
      --text:     #e8f1fa;
      --muted:    #5a7a99;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(0,229,160,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(0,180,216,0.06) 0%, transparent 70%);
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeDown .5s ease both;
    }
    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
      box-shadow: 0 0 28px rgba(0,229,160,0.3);
    }
    h1 {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: .8rem; color: var(--muted); margin-top: 4px;
      font-weight: 300; letter-spacing: .04em;
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%; max-width: 420px;
      animation: fadeUp .5s ease both;
    }

    /* ── Viewfinder ───────────────────────────────── */
    .viewfinder-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
    }
    #preview {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .corner { position: absolute; width: 22px; height: 22px; }
    .corner--tl { top: 10px; left: 10px; border-top: 3px solid var(--accent); border-left: 3px solid var(--accent); }
    .corner--tr { top: 10px; right: 10px; border-top: 3px solid var(--accent); border-right: 3px solid var(--accent); }
    .corner--bl { bottom: 10px; left: 10px; border-bottom: 3px solid var(--accent); border-left: 3px solid var(--accent); }
    .corner--br { bottom: 10px; right: 10px; border-bottom: 3px solid var(--accent); border-right: 3px solid var(--accent); }

    /* scan line */
    .scan-line {
      position: absolute; left: 10px; right: 10px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 8px var(--accent);
      animation: scanAnim 2.2s ease-in-out infinite;
      top: 10px;
      opacity: 0;
    }
    .scanning .scan-line { opacity: 1; }

    /* placeholder icon when cam not active */
    .cam-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: .8rem;
    }
    .cam-placeholder svg { width: 48px; height: 48px; opacity: .4; }

    /* ── Status ───────────────────────────────────── */
    .status-bar {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      font-size: .82rem; color: var(--muted);
      display: flex; align-items: center; gap: 10px;
      transition: all .3s ease;
      min-height: 48px;
    }
    .status-bar.active { border-color: rgba(0,229,160,.3); color: var(--text); }
    .status-bar.error  { border-color: rgba(255,107,107,.3); color: var(--warn); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--muted);
    }
    .status-bar.active .status-dot { background: var(--accent); animation: pulse 1.2s infinite; }
    .status-bar.error  .status-dot { background: var(--warn); }

    /* ── Result ───────────────────────────────────── */
    .result-card {
      margin-top: 14px;
      background: rgba(0,229,160,.05);
      border: 1px solid rgba(0,229,160,.25);
      border-radius: 10px;
      padding: 16px;
      display: none;
      animation: fadeUp .4s ease both;
    }
    .result-card.show { display: block; }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .result-label {
      font-size: .7rem; font-weight: 600; letter-spacing: .1em;
      color: var(--accent); text-transform: uppercase;
    }
    .barcode-tag {
      font-family: 'DM Mono', monospace;
      font-size: .72rem; color: var(--muted);
      background: rgba(255,255,255,.05);
      padding: 3px 8px; border-radius: 6px;
    }
    .rating-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 1rem; font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .result-summary {
      font-size: .82rem; color: #a0bdd0;
      line-height: 1.6;
    }

    /* ── Actions ──────────────────────────────────── */
    .actions {
      margin-top: 16px;
      display: flex; gap: 10px;
    }
    .btn {
      flex: 1; padding: 13px;
      border: none; border-radius: 9px;
      font-family: 'Sora', sans-serif;
      font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .18s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0b0f14;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Spinner ──────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,229,160,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    /* ── Footer ───────────────────────────────────── */
    .footer {
      margin-top: 24px;
      font-size: .72rem; color: var(--muted);
      text-align: center; line-height: 1.7;
      animation: fadeUp .6s .2s ease both; opacity: 0;
      animation-fill-mode: forwards;
    }

    /* ── Keyframes ────────────────────────────────── */
    @keyframes scanAnim {
      0%   { top: 12px; }
      50%  { top: calc(100% - 14px); }
      100% { top: 12px; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .3; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-16px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">🩺</div>
    <h1>AI Health Advisor</h1>
    <p class="subtitle">Scan any food barcode for an instant health analysis</p>
  </div>

  <!-- Main Card -->
  <div class="card">

    <!-- Viewfinder -->
    <div class="viewfinder-wrap" id="viewfinder">
      <video id="preview" playsinline muted></video>
      <div class="corner corner--tl"></div>
      <div class="corner corner--tr"></div>
      <div class="corner corner--bl"></div>
      <div class="corner corner--br"></div>
      <div class="scan-line" id="scanLine"></div>
      <div class="cam-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M3 7a2 2 0 012-2h2l2-2h6l2 2h2a2 2 0 012 2v11a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
          <circle cx="12" cy="13" r="3.5"/>
        </svg>
        Camera inactive
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot"></span>
      <span id="statusText">Press "Start Scan" to activate the camera</span>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span class="result-label">Analysis Result</span>
        <span class="barcode-tag" id="barcodeTag">—</span>
      </div>
      <div class="rating-badge" id="ratingBadge"></div>
      <p class="result-summary" id="resultSummary"></p>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="scanBtn" onclick="startScan()">▶ Start Scan</button>
      <button class="btn btn-secondary" id="stopBtn" onclick="stopScan()" style="display:none">■ Stop</button>
    </div>

  </div>

  <p class="footer">
    Powered by AI · Results are informational only<br>
    Always consult a qualified healthcare professional
  </p>

<script>
  /* ── Config ─────────────────────────────────────── */
  const RELAY_WEBHOOK = 'https://hook.relay.app/api/v1/playbook/cmmmdsod4041d0qm45pxu5lgu/trigger/_acgjWjbAbb1MOzxZOWRCw';

  /* ── State ──────────────────────────────────────── */
  const codeReader  = new ZXing.BrowserMultiFormatReader();
  let   isScanning  = false;

  /* ── DOM refs ───────────────────────────────────── */
  const viewfinder  = document.getElementById('viewfinder');
  const statusBar   = document.getElementById('statusBar');
  const statusText  = document.getElementById('statusText');
  const resultCard  = document.getElementById('resultCard');
  const barcodeTag  = document.getElementById('barcodeTag');
  const ratingBadge = document.getElementById('ratingBadge');
  const resultSummary = document.getElementById('resultSummary');
  const placeholder = document.getElementById('placeholder');
  const scanBtn     = document.getElementById('scanBtn');
  const stopBtn     = document.getElementById('stopBtn');

  /* ── Helpers ────────────────────────────────────── */
  function setStatus(msg, state = '') {
    statusBar.className = 'status-bar' + (state ? ' ' + state : '');
    statusText.textContent = msg;
  }

  function setLoading(msg) {
    statusBar.className = 'status-bar active';
    statusBar.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
  }

  function showResult({ barcode, rating, summary }) {
    barcodeTag.textContent   = barcode;
    ratingBadge.textContent  = rating  || '⚡ Analysed';
    resultSummary.textContent = summary || 'Analysis complete. Check your planner for details.';
    resultCard.classList.add('show');
  }

  /* ── Scan ───────────────────────────────────────── */
  async function startScan() {
    if (isScanning) return;
    isScanning = true;

    resultCard.classList.remove('show');
    placeholder.style.display = 'none';
    viewfinder.classList.add('scanning');
    scanBtn.style.display = 'none';
    stopBtn.style.display = '';

    setStatus('Scanning — point camera at a barcode', 'active');

    try {
      const devices = await codeReader.listVideoInputDevices();
      if (!devices.length) throw new Error('No camera found on this device.');

      // Prefer rear camera
      const device = devices.find(d =>
        /back|rear|environment/i.test(d.label)
      ) || devices[devices.length - 1];

      await codeReader.decodeFromVideoDevice(device.deviceId, 'preview', async (result, err) => {
        if (!result || !isScanning) return;

        isScanning = false;
        codeReader.reset();
        viewfinder.classList.remove('scanning');

        const barcode = result.getText();
        setLoading(`Barcode detected (${barcode}) — fetching analysis…`);

        try {
          const resp = await fetch(RELAY_WEBHOOK, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ barcode, timestamp: new Date().toISOString() })
          });

          if (!resp.ok) throw new Error(`Server responded ${resp.status}`);
          const data = await resp.json();

          setStatus('Analysis complete ✓', 'active');
          showResult({ barcode, rating: data.rating, summary: data.summary });

        } catch (fetchErr) {
          setStatus(`Barcode scanned (${barcode}) — webhook error`, 'error');
          showResult({ barcode, rating: '⚠ Webhook Error', summary: fetchErr.message });
        }

        resetButtons();
      });

    } catch (camErr) {
      isScanning = false;
      viewfinder.classList.remove('scanning');
      placeholder.style.display = '';
      setStatus('Camera error: ' + camErr.message, 'error');
      resetButtons();
    }
  }

  function stopScan() {
    if (!isScanning) return;
    isScanning = false;
    codeReader.reset();
    viewfinder.classList.remove('scanning');
    placeholder.style.display = '';
    setStatus('Scan cancelled');
    resetButtons();
  }

  function resetButtons() {
    scanBtn.textContent = '↺ Scan Again';
    scanBtn.style.display = '';
    stopBtn.style.display = 'none';
  }
</script>
</body>
</html>
